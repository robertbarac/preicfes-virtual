{% if bloque %}
<div class="bg-blue-50 border-l-4 border-blue-600 rounded-r-xl shadow-sm mb-6 mt-8 overflow-hidden" id="bloque-contexto-{{ bloque.id }}">
    <div class="px-6 py-4 border-b border-blue-100 bg-blue-100/50">
        <h3 class="font-bold text-blue-900 flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            Contexto para las siguientes preguntas
        </h3>
    </div>
    <div class="p-6 md:p-8">
        {% if bloque.texto %}
        <div class="prose max-w-none text-gray-800 text-lg leading-relaxed">
            {{ bloque.texto|safe }}
        </div>
        {% endif %}
        
        {% if bloque.imagenes.all %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 {% if bloque.texto %}mt-6{% endif %}">
                {% for img in bloque.imagenes.all %}
                    <div class="bg-white border border-gray-200 rounded p-3 text-center shadow-sm">
                        <img src="{{ img.imagen.url }}" alt="Imagen de contexto" class="max-w-full h-auto mx-auto rounded">
                        {% if img.descripcion %}
                            <p class="text-sm text-gray-500 mt-2 font-medium italic">{{ img.descripcion }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    </div>
</div>
{% endif %}
