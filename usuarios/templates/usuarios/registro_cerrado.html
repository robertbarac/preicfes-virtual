{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripciones Cerradas | PreICFES Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full mx-4 text-center">
        <!-- Logo -->
        <div class="mb-8">
            <a href="/" class="inline-flex items-center gap-2">
                <img class="h-12 w-auto grayscale opacity-80" src="{% static 'images/logo.png' %}" alt="Logo">
                <span class="text-gray-900 font-black text-3xl tracking-tight">PREICFES V.V.</span>
            </a>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-red-500"></div>
            
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Inscripciones Cerradas</h2>
            <p class="text-gray-500 mb-6">
                En este momento no hay ninguna ventana de registro abierta al público. Por favor vuelve a intentarlo más tarde o comunícate con la administración.
            </p>
            
            <a href="/" class="inline-block px-6 py-2 bg-gray-900 text-white rounded-lg shadow hover:bg-gray-800 transition font-medium">
                Regresar al Inicio
            </a>
        </div>
    </div>
    
</body>
</html>
