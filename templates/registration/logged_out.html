{% extends 'base.html' %}

{% block title %}Sesión Cerrada | PreICFES Virtual V.V.{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col justify-center items-center py-12 px-4 sm:px-6 lg:px-8">

        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-gray-400 to-gray-600"></div>

        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-gray-50 mb-6">

        <p class="text-gray-500 font-medium mb-8">Has cerrado sesión correctamente de tu cuenta de PreICFES Virtual V.V.</p>

        <a href="{% url 'login' %}" class="w-full inline-flex justify-center items-center py-3 px-6 border border-transparent rounded-lg shadow-sm text-base font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
            Volver a Iniciar Sesión
        </a>
    </div>
</div>
{% endblock %}
