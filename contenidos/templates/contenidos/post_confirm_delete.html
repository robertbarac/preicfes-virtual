{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg mt-12 text-center border-t-4 border-red-500">
    <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6">
        <svg class="h-10 w-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">¿Eliminar Post?</h2>
    <p class="text-gray-600 mb-8">Estás a punto de eliminar el post <strong>"{{ object.titulo }}"</strong> de forma permanente junto con todos sus bloques de contenido e imágenes.</p>
    
    <form method="post" class="flex flex-col space-y-3">
        {% csrf_token %}
        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg shadow transition-colors">
            Sí, Eliminar Definitivamente
        </button>
        <a href="{% url 'contenidos:post_list' %}" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-3 px-4 rounded-lg transition-colors">
            Cancelar y Volver
        </a>
    </form>
</div>
{% endblock %}
