{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-16 p-8 bg-white border border-red-100 rounded-xl shadow-lg text-center">
    
    <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6">
        <svg class="h-8 w-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
    </div>
    
    <h2 class="text-2xl font-bold text-gray-900 mb-2">¿Eliminar Bloque?</h2>
    
    <p class="text-gray-500 mb-6 text-sm">
        Estás a punto de eliminar un bloque de tipo <strong>"{{ object.get_tipo_display }}"</strong> que pertenece a la lección "{{ object.post.titulo }}". Esta acción no se puede deshacer.
    </p>

    <form method="post" class="flex flex-col sm:flex-row gap-3 justify-center">
        {% csrf_token %}
        <a href="javascript:history.back()" class="w-full sm:w-auto inline-flex justify-center items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
            Cancelar
        </a>
        <button type="submit" class="w-full sm:w-auto inline-flex justify-center items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700">
            Sí, eliminar
        </button>
    </form>
</div>
{% endblock %}
